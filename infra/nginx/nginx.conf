worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
  multi_accept on;
  use epoll;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # Performance
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_vary          on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_min_length    1000;

  # Security headers
  add_header X-Frame-Options          "SAMEORIGIN"    always;
  add_header X-Content-Type-Options   "nosniff"       always;
  add_header X-XSS-Protection         "1; mode=block" always;
  add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m      rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m     rate=5r/s;
  limit_req_zone $binary_remote_addr zone=ws:10m       rate=10r/s;
  limit_conn_zone $binary_remote_addr zone=conn:10m;

  # Upstream pools
  upstream api_pool {
    least_conn;
    server api:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream web_pool {
    server web:3000 max_fails=3 fail_timeout=30s;
    keepalive 16;
  }

  # HTTP → HTTPS redirect
  server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # API server — api.clutch.app
  server {
    listen 443 ssl http2;
    server_name api.clutch.app;

    ssl_certificate     /etc/letsencrypt/live/api.clutch.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.clutch.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 10m;

    # WebSocket endpoint
    location /ws {
      limit_req zone=ws burst=20 nodelay;
      limit_conn conn 20;

      proxy_pass         http://api_pool;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Auth endpoints — stricter rate limit
    location ~ ^/(auth)/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass         http://api_pool;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
    }

    # All other API routes
    location / {
      limit_req zone=api burst=60 nodelay;
      limit_conn conn 50;

      proxy_pass         http://api_pool;
      proxy_http_version 1.1;
      proxy_set_header   Connection        "";
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_connect_timeout 10s;
      proxy_read_timeout    60s;
      proxy_buffering    on;
      proxy_buffer_size  8k;
    }
  }

  # Web app — clutch.app
  server {
    listen 443 ssl http2;
    server_name clutch.app www.clutch.app;

    ssl_certificate     /etc/letsencrypt/live/clutch.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clutch.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSLW:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Static asset caching
    location /_next/static/ {
      proxy_pass         http://web_pool;
      proxy_cache_valid  200 365d;
      add_header         Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
      proxy_pass         http://web_pool;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
