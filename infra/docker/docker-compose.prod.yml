version: '3.9'

# ── Clutch production ─────────────────────────────────────────────────────────
#
# Database: Supabase (managed cloud Postgres)
#   - No local postgres container
#   - Set DATABASE_URL to the Supabase session pooler URL
#   - Set DIRECT_URL to the Supabase direct connection URL (for migrations)
#
# Cache: local Redis for WebSocket session routing + queue
# Web:   nginx TLS termination → Next.js + Hono API

services:

  # ── Redis (WebSocket sessions + queue) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?required} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  3s
      retries:  5
    networks:
      - internal

  # ── Clutch API ──────────────────────────────────────────────────────────────
  api:
    image: ghcr.io/${GITHUB_REPO:-your-org/clutch}/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV:          production
      PORT:              3001
      # Supabase — session pooler (use DIRECT_URL for migrations separately)
      DATABASE_URL:      ${DATABASE_URL:?required — Supabase session pooler URL}
      SUPABASE_URL:      ${SUPABASE_URL:?required}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:?required}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?required}
      # App secrets
      JWT_SECRET:        ${JWT_SECRET:?required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?required}
      INTERNAL_SECRET:   ${INTERNAL_SECRET:?required}
      # Redis
      REDIS_URL:         redis://:${REDIS_PASSWORD}@redis:6379
      # Chains
      SOLANA_RPC_URL:    ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      ETH_RPC_URL:       ${ETH_RPC_URL:-https://eth.llamarpc.com}
      BASE_RPC_URL:      ${BASE_RPC_URL:-https://mainnet.base.org}
      POLYGON_RPC_URL:   ${POLYGON_RPC_URL:-https://polygon-rpc.com}
      ARBITRUM_RPC_URL:  ${ARBITRUM_RPC_URL:-https://arb1.arbitrum.io/rpc}
      OPTIMISM_RPC_URL:  ${OPTIMISM_RPC_URL:-https://mainnet.optimism.io}
      CORS_ORIGIN:       ${CORS_ORIGIN:-https://clutch.app}
      SENTRY_DSN:        ${SENTRY_DSN:-}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:     ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout:  5s
      retries:  3
    networks:
      - internal
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512m
          cpus:   '0.5'

  # ── Clutch Web (Next.js) ────────────────────────────────────────────────────
  web:
    image: ghcr.io/${GITHUB_REPO:-your-org/clutch}/web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV:                    production
      NEXT_PUBLIC_API_URL:         ${PUBLIC_API_URL:-https://api.clutch.app}
      NEXT_PUBLIC_WS_URL:          ${PUBLIC_WS_URL:-wss://api.clutch.app/ws}
      NEXT_PUBLIC_SUPABASE_URL:    ${SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    depends_on:
      - api
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512m
          cpus:   '0.5'

  # ── nginx reverse proxy + TLS ───────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - internal
      - external

  # ── Certbot (auto TLS renewal) ──────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - internal

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?required}
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - internal

volumes:
  redis_data:
  certbot_webroot:
  certbot_certs:
  prometheus_data:
  grafana_data:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
