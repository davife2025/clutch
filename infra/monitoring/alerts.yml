groups:
  - name: clutch-api
    rules:

      - alert: ApiDown
        expr: up{job="clutch-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Clutch API is down"
          description: "The Clutch API has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(http_requests_total{job="clutch-api",status=~"5.."}[5m]) / rate(http_requests_total{job="clutch-api"}[5m]) > 0.05
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate (> 5%)"
          description: "More than 5% of API requests are returning 5xx errors."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="clutch-api"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency (p95 > 2s)"
          description: "95th percentile API response time exceeds 2 seconds."

      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_activity_count{datname="clutch"} > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connection pool near limit"
          description: "More than 80 active DB connections — pool may be exhausted soon."

      - alert: MemoryPressure
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage (> 90%)"
          description: "Host memory usage has been above 90% for 5 minutes."

      - alert: DiskSpaceLow
        expr: (node_filesystem_size_bytes - node_filesystem_free_bytes) / node_filesystem_size_bytes > 0.85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space (> 85% used)"
          description: "Disk usage is above 85%. Review data retention settings."

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been unreachable for more than 1 minute. WebSocket sessions and queues affected."
