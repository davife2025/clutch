version: '3.9'

# ── Clutch local dev ──────────────────────────────────────────────────────────
#
# Database: Supabase (cloud) — no local postgres container needed.
# Set DATABASE_URL + DIRECT_URL in your .env file.
#
# Usage:
#   cp .env.example .env   # fill in Supabase URLs
#   docker compose up -d
#
# Or without Docker:
#   pnpm dev

services:

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: builder     # dev build, not production
    command: node --watch apps/api/dist/index.js
    ports:
      - "3001:3001"
    environment:
      NODE_ENV:          development
      PORT:              3001
      DATABASE_URL:      ${DATABASE_URL:?Set DATABASE_URL in .env (Supabase session pooler)}
      DIRECT_URL:        ${DIRECT_URL:-}
      SUPABASE_URL:      ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      JWT_SECRET:        ${JWT_SECRET:?Set JWT_SECRET in .env}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SOLANA_RPC_URL:    ${SOLANA_RPC_URL:-https://api.mainnet-beta.solana.com}
      INTERNAL_SECRET:   ${INTERNAL_SECRET:-dev-internal-secret}
      CORS_ORIGIN:       "*"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: builder
    command: pnpm --filter @clutch/web dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL:         http://localhost:3001
      NEXT_PUBLIC_WS_URL:          ws://localhost:3001/ws
      NEXT_PUBLIC_SUPABASE_URL:    ${SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
